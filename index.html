<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luyện Tiếng Anh Lớp 4 🌟</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="logo">
                <h1>🌟 English Learning Land 🌟</h1>
                <p>Luyện tiếng Anh vui vẻ cho học sinh lớp 4</p>
            </div>
            <div class="user-stats">
                <div class="score-display">
                    <span class="score-label">⭐ Điểm:</span>
                    <span class="score-value" id="scoreDisplay">0</span>
                </div>
                <div class="progress-display">
                    <span class="progress-label">📊 Tiến độ:</span>
                    <span class="progress-value" id="progressDisplay">0%</span>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Menu Navigation -->
            <nav class="menu-nav" id="menuNav">
                <button class="menu-btn active" data-section="vocabulary">
                    <span class="btn-emoji">📚</span>
                    <span class="btn-text">Từ Vựng</span>
                </button>
                <button class="menu-btn" data-section="listening">
                    <span class="btn-emoji">👂</span>
                    <span class="btn-text">Nghe</span>
                </button>
                <button class="menu-btn" data-section="reading">
                    <span class="btn-emoji">👁️</span>
                    <span class="btn-text">Đọc</span>
                </button>
                <button class="menu-btn" data-section="writing">
                    <span class="btn-emoji">✍️</span>
                    <span class="btn-text">Viết</span>
                </button>
                <button class="menu-btn" data-section="games">
                    <span class="btn-emoji">🎮</span>
                    <span class="btn-text">Trò Chơi</span>
                </button>
            </nav>

            <!-- Content Sections -->
            <!-- Vocabulary Section -->
            <section id="vocabulary" class="section active">
                <h2>📚 Bài Học Từ Vựng</h2>
                <div class="topic-selector">
                    <button class="topic-btn active" data-topic="animals">Động Vật 🦁</button>
                    <button class="topic-btn" data-topic="colors">Màu Sắc 🎨</button>
                    <button class="topic-btn" data-topic="fruits">Trái Cây 🍎</button>
                    <button class="topic-btn" data-topic="numbers">Số Đếm 🔢</button>
                    <button class="topic-btn" data-topic="family">Gia Đình 👨‍👩‍👧</button>
                </div>

                <div class="vocabulary-content">
                    <div class="vocab-cards" id="vocabCards">
                        <!-- Cards will be generated by JavaScript -->
                    </div>
                </div>

                <div class="vocab-actions">
                    <button class="btn btn-primary" id="playAudio">🔊 Phát Âm</button>
                    <button class="btn btn-secondary" id="nextVocab">➡️ Từ Tiếp Theo</button>
                </div>
            </section>

            <!-- Listening Section -->
            <section id="listening" class="section">
                <h2>👂 Bài Tập Nghe</h2>
                <div class="listening-content">
                    <div class="audio-player">
                        <button class="btn btn-large" id="playListeningAudio">🔊 Nghe Câu</button>
                    </div>
                    <div class="listening-question">
                        <p id="listeningQuestion">Bạn vừa nghe cái gì?</p>
                    </div>
                    <div class="listening-options" id="listeningOptions">
                        <!-- Options will be generated by JavaScript -->
                    </div>
                    <div id="listeningFeedback" class="feedback"></div>
                </div>
            </section>

            <!-- Reading Section -->
            <section id="reading" class="section">
                <h2>👁️ Bài Tập Đọc</h2>
                <div class="reading-content">
                    <div class="reading-text" id="readingText">
                        <!-- Reading passage will be generated by JavaScript -->
                    </div>
                    <div class="reading-questions" id="readingQuestions">
                        <!-- Questions will be generated by JavaScript -->
                    </div>
                    <div id="readingFeedback" class="feedback"></div>
                </div>
            </section>

            <!-- Writing Section -->
            <section id="writing" class="section">
                <h2>✍️ Bài Tập Viết</h2>
                <div class="writing-content">
                    <div class="writing-prompt" id="writingPrompt">
                        <!-- Prompt will be generated by JavaScript -->
                    </div>
                    <div class="writing-exercise">
                        <p class="writing-instruction">Hoàn thành câu sau:</p>
                        <div class="writing-input-wrapper">
                            <input type="text" id="writingInput" placeholder="Nhập từ hoặc câu..." class="writing-input">
                        </div>
                        <button class="btn btn-primary" id="submitWriting">✅ Nộp Bài</button>
                        <div id="writingFeedback" class="feedback"></div>
                    </div>
                </div>
            </section>

            <!-- Games Section -->
            <section id="games" class="section">
                <h2>🎮 Trò Chơi Cuối Tuần</h2>
                <div class="games-grid">
                    <button class="game-card active" id="gameMemory">
                        <span class="game-emoji">🧠</span>
                        <span class="game-name">Ghép Cặp</span>
                    </button>
                    <button class="game-card" id="gameDragDrop">
                        <span class="game-emoji">🎯</span>
                        <span class="game-name">Kéo & Thả</span>
                    </button>
                </div>

                <div class="game-content" id="gameContent">
                    <!-- Game content will be generated by JavaScript -->
                </div>
            </section>
        </main>

        <!-- Footer -->
        <footer class="footer">
            <p>Chúc bạn học tiếng Anh vui vẻ! 🎉 | Bản 1.0 | Made with ❤️ for Kids</p>
        </footer>
    </div>

    <script src="assets/js/data.js"></script>
    <script src="assets/js/app.js"></script>
</body>
</html>
